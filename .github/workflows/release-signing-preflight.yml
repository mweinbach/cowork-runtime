name: Runtime Release Signing Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-signing-key:
    name: Verify release signing key
    runs-on: ubuntu-latest
    env:
      COWORK_RUNTIME_SIGNING_PRIVATE_KEY: ${{ secrets.COWORK_RUNTIME_SIGNING_PRIVATE_KEY }}
      COWORK_RUNTIME_SIGNING_KEY_ID: ${{ vars.COWORK_RUNTIME_SIGNING_KEY_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate signing variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${COWORK_RUNTIME_SIGNING_PRIVATE_KEY:-}" || {
            echo "Missing COWORK_RUNTIME_SIGNING_PRIVATE_KEY repository secret" >&2
            exit 1
          }
          test -n "${COWORK_RUNTIME_SIGNING_KEY_ID:-}" || {
            echo "Missing COWORK_RUNTIME_SIGNING_KEY_ID repository variable" >&2
            exit 1
          }

      - name: Materialize private key for release steps
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          key_file="$RUNNER_TEMP/${COWORK_RUNTIME_SIGNING_KEY_ID}.pem"
          printf '%s' "$COWORK_RUNTIME_SIGNING_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "COWORK_RUNTIME_SIGNING_KEY_FILE=$key_file" >> "$GITHUB_ENV"

      - name: Verify private key matches pinned public key
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createPrivateKey, createPublicKey, timingSafeEqual } from "node:crypto";
          import fs from "node:fs";
          import path from "node:path";

          const keyId = process.env.COWORK_RUNTIME_SIGNING_KEY_ID;
          const privateKeyFile = process.env.COWORK_RUNTIME_SIGNING_KEY_FILE;
          if (!keyId || !privateKeyFile) throw new Error("Signing key environment is incomplete");
          const expected = createPublicKey(
            fs.readFileSync(path.join("keys", `${keyId}.pub.pem`)),
          ).export({ format: "der", type: "spki" });
          const actual = createPublicKey(
            createPrivateKey(fs.readFileSync(privateKeyFile)),
          ).export({ format: "der", type: "spki" });
          if (expected.length !== actual.length || !timingSafeEqual(expected, actual)) {
            throw new Error("GitHub release signing secret does not match the pinned public key");
          }
          console.log(`Verified GitHub runtime signing identity: ${keyId}`);
          NODE

      - name: Remove materialized private key
        if: always()
        shell: bash
        run: |
          if [ -n "${COWORK_RUNTIME_SIGNING_KEY_FILE:-}" ]; then
            rm -f -- "$COWORK_RUNTIME_SIGNING_KEY_FILE"
          fi
